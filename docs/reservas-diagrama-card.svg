<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3f6f7b"/>
      <stop offset="1" stop-color="#2a5561"/>
    </linearGradient>
    <linearGradient id="turq" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4dd2d0"/>
      <stop offset="1" stop-color="#7fe3e1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- decorative dots grid -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="1040" cy="120" r="140"/>
    <circle cx="1150" cy="520" r="90"/>
  </g>

  <!-- brand mark -->
  <g transform="translate(96,86)">
    <g transform="scale(2.1)">
      <rect x="3" y="6" width="26" height="23" rx="5" fill="#ffffff" opacity="0.14"/>
      <rect x="3" y="6" width="26" height="8" rx="5" fill="url(#turq)"/>
      <rect x="9" y="3" width="3" height="6" rx="1.5" fill="#ffffff" opacity="0.5"/>
      <rect x="20" y="3" width="3" height="6" rx="1.5" fill="#ffffff" opacity="0.5"/>
      <circle cx="16" cy="20.5" r="5" fill="url(#turq)"/>
      <path d="M13.7 20.5l1.7 1.7 3-3.3" stroke="#2a5561" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="86" y="26" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="-0.5">adrihosan</text>
    <text x="86" y="52" fill="#4dd2d0" font-size="15" font-weight="600" letter-spacing="4">RESERVAS</text>
  </g>

  <!-- headline -->
  <text x="96" y="320" fill="#ffffff" font-size="72" font-weight="700" letter-spacing="-1.5">Sistema de reservas</text>
  <text x="96" y="400" fill="#ffffff" font-size="72" font-weight="700" letter-spacing="-1.5">en <tspan fill="#4dd2d0">4 pasos</tspan> de flujo</text>

  <text x="96" y="470" fill="#cfe6ea" font-size="30" font-weight="400">Un Calendly propio dentro de WordPress · Google Calendar · CRM</text>

  <!-- GET->POST chip -->
  <g transform="translate(96,520)" font-size="24" font-weight="700" font-family="ui-monospace, Menlo, Consolas, monospace">
    <rect x="0" y="0" width="228" height="48" rx="10" fill="#ffffff" opacity="0.10"/>
    <text x="20" y="32" fill="#ffd9d0" text-decoration="line-through">GET</text>
    <text x="92" y="32" fill="#4dd2d0">→</text>
    <rect x="120" y="0" width="108" height="48" rx="10" fill="#4dd2d0"/>
    <text x="140" y="32" fill="#0c3a39">POST</text>
  </g>
</svg>
